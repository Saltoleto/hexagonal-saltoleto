spring:
  datasource:
    url: jdbc:mysql://localhost:3306/produto_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate          # Flyway gerencia o schema — JPA apenas valida
    show-sql: false               # false em produção — use logs estruturados
    open-in-view: false           # Sem lazy loading fora da transação — obrigatório
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  threads:
    virtual:
      enabled: true               # Virtual threads — Java 21

server:
  port: 8080

logging:
  level:
    com.empresa.produto: DEBUG
    org.springframework.web: INFO
